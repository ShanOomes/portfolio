<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="IBM Plex Mono, monospace" font-size="11">
  <!-- Background -->
  <rect width="900" height="200" fill="#F2F2F2"/>

  <!-- Step boxes -->
  <!-- 1: PDF Ingestion -->
  <rect x="20" y="60" width="140" height="80" fill="none" stroke="#111" stroke-width="1"/>
  <text x="90" y="96" text-anchor="middle" fill="#111" font-size="10" font-weight="500">Azure Form</text>
  <text x="90" y="110" text-anchor="middle" fill="#111" font-size="10" font-weight="500">Recognizer</text>
  <text x="90" y="55" text-anchor="middle" fill="#555" font-size="9" text-transform="uppercase" letter-spacing="1">01 / INGESTION</text>

  <!-- Arrow -->
  <line x1="160" y1="100" x2="195" y2="100" stroke="#111" stroke-width="1"/>
  <polygon points="195,96 203,100 195,104" fill="#111"/>

  <!-- 2: Embedding -->
  <rect x="203" y="60" width="140" height="80" fill="none" stroke="#111" stroke-width="1"/>
  <text x="273" y="96" text-anchor="middle" fill="#111" font-size="10" font-weight="500">SBERT</text>
  <text x="273" y="110" text-anchor="middle" fill="#111" font-size="10" font-weight="500">Embeddings</text>
  <text x="273" y="55" text-anchor="middle" fill="#555" font-size="9">02 / EMBEDDING</text>

  <!-- Arrow -->
  <line x1="343" y1="100" x2="378" y2="100" stroke="#111" stroke-width="1"/>
  <polygon points="378,96 386,100 378,104" fill="#111"/>

  <!-- 3: FAISS Index -->
  <rect x="386" y="60" width="140" height="80" fill="none" stroke="#111" stroke-width="1"/>
  <text x="456" y="96" text-anchor="middle" fill="#111" font-size="10" font-weight="500">FAISS Vector</text>
  <text x="456" y="110" text-anchor="middle" fill="#111" font-size="10" font-weight="500">Index</text>
  <text x="456" y="55" text-anchor="middle" fill="#555" font-size="9">03 / RETRIEVAL</text>

  <!-- Arrow -->
  <line x1="526" y1="100" x2="561" y2="100" stroke="#111" stroke-width="1"/>
  <polygon points="561,96 569,100 561,104" fill="#111"/>

  <!-- 4: LLM Generation -->
  <rect x="569" y="60" width="140" height="80" fill="none" stroke="#111" stroke-width="1"/>
  <text x="639" y="96" text-anchor="middle" fill="#111" font-size="10" font-weight="500">LLM</text>
  <text x="639" y="110" text-anchor="middle" fill="#111" font-size="10" font-weight="500">Generation</text>
  <text x="639" y="55" text-anchor="middle" fill="#555" font-size="9">04 / GENERATION</text>

  <!-- Arrow -->
  <line x1="709" y1="100" x2="744" y2="100" stroke="#111" stroke-width="1"/>
  <polygon points="744,96 752,100 744,104" fill="#111"/>

  <!-- 5: SharePoint Output -->
  <rect x="752" y="60" width="130" height="80" fill="none" stroke="#1400FF" stroke-width="1"/>
  <text x="817" y="96" text-anchor="middle" fill="#111" font-size="10" font-weight="500">SharePoint</text>
  <text x="817" y="110" text-anchor="middle" fill="#111" font-size="10" font-weight="500">Interface</text>
  <text x="817" y="55" text-anchor="middle" fill="#555" font-size="9">05 / OUTPUT</text>

  <!-- Bottom label -->
  <text x="450" y="185" text-anchor="middle" fill="#555" font-size="9" letter-spacing="2">AIDA — RETRIEVAL-AUGMENTED GENERATION PIPELINE</text>
</svg>
